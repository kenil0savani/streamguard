name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Lint
        run: ruff check stream_processor api tests

      - name: Run unit tests
        run: pytest tests -v

  build-api-image:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image
        run: docker build -f api/Dockerfile -t streamguard-api:ci .
        
  deploy-to-aks:
    needs: build-api-image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push image
        run: |
          docker build -f api/Dockerfile -t ${{ secrets.ACR_NAME }}.azurecr.io/streamguard-api:${{ github.sha }} .
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/streamguard-api:${{ github.sha }}

      - name: Get AKS credentials
        run: az aks get-credentials --resource-group ${{ secrets.RESOURCE_GROUP }} --name ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Deploy new image
        run: kubectl set image deployment/streamguard-api streamguard-api=${{ secrets.ACR_NAME }}.azurecr.io/streamguard-api:${{ github.sha }}
